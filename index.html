<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyOrgTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Geist',system-ui,sans-serif;background:#fafaf8;color:#18181b;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.5}
  .card{background:#fff;border-radius:22px;padding:44px 36px 36px;max-width:440px;width:100%;box-shadow:0 2px 24px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);text-align:center}
  .logo{width:56px;height:56px;border-radius:14px;background:#18181b;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:22px;letter-spacing:-.02em;margin-bottom:22px}
  h1{font-weight:500;font-size:28px;letter-spacing:-.025em;margin-bottom:10px}
  p{font-size:15px;color:#55595e;margin-bottom:28px;max-width:340px;margin-left:auto;margin-right:auto}
  .btn{display:inline-block;padding:13px 26px;background:#18181b;color:#fff;text-decoration:none;border-radius:999px;font-size:14px;font-weight:500;transition:.15s;margin:4px}
  .btn:hover{transform:translateY(-1px);opacity:.9}
  .btn.outline{background:transparent;color:#18181b;border:1px solid rgba(0,0,0,.14)}
  .footer{margin-top:32px;padding-top:20px;border-top:1px solid rgba(0,0,0,.06);font-size:12px;color:#8a8d92;font-family:'DM Mono',monospace;letter-spacing:.05em}
  .help{font-size:12px;color:#8a8d92;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>MyOrgTracker</h1>
    <p>Organizational Volume tracking for Herbalife distributors. Daily progress toward your PIN goals.</p>
    <a href="/admin" class="btn">Admin Portal</a>
    <a href="/tracker" class="btn outline">Distributor Tracker</a>
    <div class="help">
      If you're a distributor, use the personal link your sponsor sent you.<br>
      It looks like: <strong>/tracker?user=<em>your-name</em></strong>
    </div>
    <div class="footer">MYORGTRACKER</div>
  </div>
</body>
</html>
