<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4ede1">
<title>MyOrgTracker · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2318181b'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='EB Garamond,serif' font-weight='600' font-size='20' fill='%23fbbf24' letter-spacing='-0.03em'%3EO%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{background:#f4ede1;-webkit-tap-highlight-color:transparent}
body{font-family:'Geist',system-ui,sans-serif;background:#f4ede1;color:#18181b;min-height:100vh;min-height:100dvh;line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;padding:0 20px;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

.page{flex:1;display:flex;flex-direction:column;max-width:440px;margin:0 auto;width:100%;padding-top:48px;padding-bottom:28px}

/* Wordmark */
.wm{font-family:'EB Garamond',serif;line-height:0.95;letter-spacing:-0.015em;color:#18181b;display:inline-flex;align-items:baseline}
.wm .my{font-style:italic;font-weight:400}
.wm .org{font-weight:600}
.wm .tracker{font-weight:400;color:#7a7568;margin-left:0.04em}

.topbar{display:flex;align-items:center;justify-content:center;margin-bottom:56px}

/* Hero intro */
.hero-intro{margin-bottom:28px}
.hero-intro h2{font-family:'EB Garamond',serif;font-size:clamp(28px,8vw,34px);font-weight:400;letter-spacing:-0.01em;line-height:1.1;color:#18181b;margin-bottom:10px}
.hero-intro h2 em{font-style:italic}
.hero-intro p{font-size:15px;color:#5d5a52;line-height:1.55;max-width:360px}

/* Card */
.card{background:#fbf6ec;border-radius:20px;padding:26px 24px;box-shadow:0 1px 2px rgba(61,46,31,0.04),0 10px 28px rgba(61,46,31,0.06);border:1px solid rgba(61,46,31,0.06)}

.card-head{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#8a8578;margin-bottom:18px;font-weight:500}

.field{margin-bottom:14px}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#7a7568;margin-bottom:6px;font-weight:500}
.field input{width:100%;height:48px;border:1px solid rgba(61,46,31,0.14);border-radius:10px;padding:0 14px;font-size:16px;background:#fffdf5;color:#18181b;outline:none;font-family:'Geist',sans-serif;transition:border-color .15s,background .15s;-webkit-appearance:none}
.field input:focus{border-color:#18181b;background:#fff}
.field input::placeholder{color:#b8b0a0}
.field input:disabled{opacity:0.5;background:#f5f0e3}

.forgot{display:block;text-align:right;font-size:13px;color:#7a7568;text-decoration:none;margin-top:-6px;margin-bottom:18px;font-weight:500;background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 2px;margin-left:auto;min-height:32px}
.forgot:hover,.forgot:focus{color:#18181b;text-decoration:underline}

.btn-primary{width:100%;height:52px;background:#18181b;color:#fafaf8;border:none;border-radius:11px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;letter-spacing:0.005em;transition:transform .1s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-primary:hover:not(:disabled){transform:translateY(-1px)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fafaf8;border-radius:50%;animation:spin .75s linear infinite;display:none}
.btn-primary.loading .spinner{display:block}
.btn-primary.loading .btn-label{opacity:0.75}
@keyframes spin{to{transform:rotate(360deg)}}

.alert{font-size:13.5px;line-height:1.5;border-radius:10px;padding:12px 14px;margin-bottom:16px;display:none}
.alert.on{display:block}
.alert-err{background:#fbf0f0;color:#3d1a24;border:1px solid rgba(184,74,94,0.22)}
.alert-ok{background:#f0f6ed;color:#1d3312;border:1px solid rgba(90,138,58,0.25)}

.under-link{text-align:center;margin-top:22px;font-size:13.5px;color:#7a7568;font-weight:500}
.under-link button{color:#18181b;text-decoration:none;border:none;background:none;cursor:pointer;font-family:inherit;font-weight:500;font-size:inherit;padding:4px 2px;border-bottom:1px solid rgba(24,24,27,0.25)}
.under-link button:hover{border-bottom-color:#18181b}

/* Footer */
.lp-footer{margin-top:auto;padding-top:40px;text-align:center;font-size:11px;color:#a89f8d;font-family:'DM Mono',monospace;letter-spacing:0.14em;text-transform:uppercase}

/* Hidden element swap for forgot-password mode */
/* Use .field.pw-wrap so we only match the password field (where pw-wrap sits on .field directly),
   not the email input's wrapper (where pw-wrap is a child div added by initFieldEnhancements). */
.mode-forgot .field.pw-wrap,.mode-forgot .forgot-btn{display:none}
.mode-forgot .back-btn{display:inline-flex}
.back-btn{display:none;align-items:center;gap:6px;margin-bottom:16px;font-size:13.5px;color:#7a7568;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:6px 4px;margin-left:-4px}
.back-btn:hover{color:#18181b}

/* Subtle paper texture */
html::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background-image:radial-gradient(rgba(61,46,31,0.025) 1px,transparent 1px);background-size:3px 3px}

/* ── PASSWORD TOGGLE ── */
.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap input{flex:1;padding-right:44px!important}
.pw-eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;color:var(--ink3,#5d5a52);padding:5px;display:flex;align-items:center;justify-content:center;transition:.12s;border-radius:6px;flex-shrink:0;height:32px;width:32px}
.pw-eye:hover{color:var(--ink,#18181b);background:rgba(0,0,0,0.04)}
.pw-eye svg{pointer-events:none}

/* ── GITHUB VERSION CHECKER ── */
.gh-check{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 9px;border-radius:20px;transition:all .3s;white-space:nowrap;letter-spacing:.05em;cursor:default;user-select:none}
.gh-check.checking{background:rgba(0,0,0,0.05);color:var(--ink4,#a89f8d)}
.gh-check.ok{background:rgba(45,107,66,0.1);color:var(--green,#2d6b42)}
.gh-check.update{background:#fef3c7;color:#92400e;cursor:pointer;font-weight:600;animation:gh-pulse 2s ease-in-out infinite}
.gh-check.rate,.gh-check.error{opacity:0;pointer-events:none}
@keyframes gh-pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>

<div class="page" id="page">

  <header class="topbar">
    <a href="/" class="wm" style="font-size:clamp(22px,6vw,26px);text-decoration:none"><span class="my">my</span><span class="org">Org</span><span class="tracker">Tracker</span></a>
  </header>

  <main class="hero-intro" id="hero">
    <h2 id="hero-h"><em>Welcome back.</em></h2>
    <p id="hero-p">Sign in to track your Org Volume and see today's progress.</p>
  </main>

  <div class="card" id="auth-card">
    <div class="card-head" id="card-head">Distributor Sign In</div>

    <button class="back-btn" id="back-btn" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to sign in
    </button>

    <div class="alert alert-err" id="alert-err"></div>
    <div class="alert alert-ok" id="alert-ok"></div>

    <form id="auth-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" inputmode="email" placeholder="you@example.com" required>
      </div>
      <div class="field pw-wrap">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="button" class="forgot forgot-btn" id="forgot-btn">Forgot password?</button>
      <button type="submit" class="btn-primary" id="submit-btn">
        <span class="btn-label" id="btn-label">Sign In</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
    </form>
  </div>

  <div class="under-link">
    Are you an admin? <button type="button" id="admin-toggle">Sign in here</button>
  </div>

  <footer class="lp-footer" style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div id="gh-check" class="gh-check checking">···</div>
    <span>myOrgTracker</span>
  </footer>

</div>


<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

// ═══════════════════════════════════════════════════════════════
// Config
// ═══════════════════════════════════════════════════════════════
const SB_URL = 'https://nclvgzirfzddrbsnzryo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbHZnemlyZnpkZHJic256cnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mzc0NTgsImV4cCI6MjA5MjAxMzQ1OH0.y7paxIa6Zd2ubwO8w_YwEHVNiKA5D6L5vHKxz7P6gC0';
const sb = createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true, flowType: 'pkce' } });

// ═══════════════════════════════════════════════════════════════
// Element refs
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const page = $('page'), card = $('auth-card'), form = $('auth-form');
const emailEl = $('email'), pwEl = $('password');
const submitBtn = $('submit-btn'), btnLabel = $('btn-label');
const errEl = $('alert-err'), okEl = $('alert-ok');
const heroH = $('hero-h'), heroP = $('hero-p'), cardHead = $('card-head');
const forgotBtn = $('forgot-btn'), backBtn = $('back-btn'), adminToggle = $('admin-toggle');

let mode = 'distributor'; // 'distributor' | 'admin' | 'forgot'

// ═══════════════════════════════════════════════════════════════
// UI helpers
// ═══════════════════════════════════════════════════════════════
function setMode(m){
  mode = m;
  errEl.classList.remove('on'); okEl.classList.remove('on');
  card.classList.toggle('mode-forgot', m==='forgot');
  if(m==='distributor'){
    heroH.innerHTML='<em>Welcome back.</em>';
    heroP.textContent='Sign in to track your Org Volume and see today\'s progress.';
    cardHead.textContent='Distributor Sign In';
    btnLabel.textContent='Sign In';
    pwEl.autocomplete='current-password';
  } else if(m==='admin'){
    heroH.innerHTML='<em>Admin portal.</em>';
    heroP.textContent='Sign in to manage distributors, view all data, and configure the platform.';
    cardHead.textContent='Admin Sign In';
    btnLabel.textContent='Sign In as Admin';
    pwEl.autocomplete='current-password';
  } else if(m==='forgot'){
    heroH.innerHTML='<em>Reset password.</em>';
    heroP.textContent='Enter your email and we\'ll send you a link to set a new password.';
    cardHead.textContent='Forgot Password';
    btnLabel.textContent='Send Reset Link';
  }
}
function showErr(msg){
  errEl.textContent=msg; errEl.classList.add('on'); okEl.classList.remove('on');
}
function showOk(msg){
  okEl.textContent=msg; okEl.classList.add('on'); errEl.classList.remove('on');
}
function setLoading(on){
  submitBtn.classList.toggle('loading',on);
  submitBtn.disabled=on;
  emailEl.disabled=on; pwEl.disabled=on;
}

// ═══════════════════════════════════════════════════════════════
// Mode switches
// ═══════════════════════════════════════════════════════════════
adminToggle.addEventListener('click',()=>{
  setMode(mode==='admin'?'distributor':'admin');
  adminToggle.textContent = mode==='admin' ? 'Back to distributor sign in' : 'Sign in here';
  emailEl.focus();
});
forgotBtn.addEventListener('click',()=>{
  setMode('forgot');
  emailEl.focus();
});
backBtn.addEventListener('click',()=>{
  setMode('distributor');
  adminToggle.textContent='Sign in here';
});

// ═══════════════════════════════════════════════════════════════
// Form submit — routes by mode
// ═══════════════════════════════════════════════════════════════
form.addEventListener('submit',async(e)=>{
  e.preventDefault();
  const email=emailEl.value.trim().toLowerCase();
  const pw=pwEl.value;
  if(!email){showErr('Please enter your email.');return}

  if(mode==='forgot'){
    return handleForgot(email);
  }
  if(!pw){showErr('Please enter your password.');return}
  return handleLogin(email,pw);
});

async function handleLogin(email,password){
  setLoading(true);
  errEl.classList.remove('on'); okEl.classList.remove('on');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    setLoading(false);
    if(error.message.toLowerCase().includes('invalid login')){
      showErr('Email or password is incorrect. Try again or tap Forgot password.');
    } else if(error.message.toLowerCase().includes('email not confirmed')){
      showErr('Your email isn\'t confirmed yet. Check your inbox for the confirmation link.');
    } else {
      showErr(error.message);
    }
    return;
  }
  // Logged in — look up profile to decide where to send them
  const { data: profile, error: perr } = await sb
    .from('profiles')
    .select('role, slug, display_name')
    .eq('id', data.user.id)
    .single();
  if(perr || !profile){
    setLoading(false);
    showErr('Your account isn\'t fully set up. Please contact your admin.');
    await sb.auth.signOut();
    return;
  }
  // Admin mode strictness: if they used the admin form, their profile MUST be admin
  if(mode==='admin' && profile.role!=='admin'){
    setLoading(false);
    showErr('This account doesn\'t have admin access.');
    await sb.auth.signOut();
    return;
  }
  if(profile.role==='admin'){
    showOk('Signing you in…');
    window.location.href = '/admin';
    return;
  }
  // distributor path
  if(!profile.slug){
    setLoading(false);
    showErr('Your distributor profile isn\'t fully set up (no slug assigned). Please contact your admin.');
    await sb.auth.signOut();
    return;
  }
  showOk('Signing you in…');
  window.location.href = '/tracker?user=' + encodeURIComponent(profile.slug);
}

async function handleForgot(email){
  setLoading(true);
  errEl.classList.remove('on'); okEl.classList.remove('on');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password'
  });
  setLoading(false);
  if(error){ showErr(error.message); return }
  showOk('Check your email for a password reset link. It may take a minute to arrive.');
  pwEl.value='';
}

// ═══════════════════════════════════════════════════════════════
// If already signed in, send them onward
// ═══════════════════════════════════════════════════════════════
(async()=>{
  const { data: { session } } = await sb.auth.getSession();
  if(!session) return;
  const { data: profile } = await sb.from('profiles').select('role, slug').eq('id', session.user.id).single();
  if(!profile) return;
  if(profile.role==='admin'){ window.location.href='/admin'; return }
  if(profile.slug){ window.location.href='/tracker?user='+encodeURIComponent(profile.slug); return }
  // distributor with no slug — stay on landing page with a message
  showErr('Your distributor profile isn\'t fully set up. Please contact your admin.');
  await sb.auth.signOut();
})();

// Surface a clean initial state
setMode('distributor');
initFieldEnhancements();
startGhChecker();
</script>

<script>

// ══════════════════════════════════════════
//  PASSWORD + EMAIL FIELD ENHANCEMENTS
// ══════════════════════════════════════════
const EYE_OPEN = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_SHUT = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const CLR_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

function initFieldEnhancements(){
  // Password eye toggle
  document.querySelectorAll('input[type="password"]').forEach(inp=>{
    if(inp.closest('.pw-wrap'))return;
    const wrap=document.createElement('div');wrap.className='pw-wrap';
    inp.parentNode.insertBefore(wrap,inp);wrap.appendChild(inp);
    const btn=document.createElement('button');btn.type='button';btn.className='pw-eye';
    btn.setAttribute('aria-label','Toggle visibility');btn.innerHTML=EYE_OPEN;
    btn.addEventListener('click',()=>{
      const show=inp.type==='password';
      inp.type=show?'text':'password';
      btn.innerHTML=show?EYE_SHUT:EYE_OPEN;
    });
    wrap.appendChild(btn);
  });
  // Email clear button
  document.querySelectorAll('input[type="email"]').forEach(inp=>{
    if(inp.closest('.pw-wrap'))return;
    const wrap=document.createElement('div');wrap.className='pw-wrap';
    inp.parentNode.insertBefore(wrap,inp);wrap.appendChild(inp);
    const btn=document.createElement('button');btn.type='button';btn.className='pw-eye';
    btn.setAttribute('aria-label','Clear');btn.innerHTML=CLR_ICON;btn.style.display='none';
    inp.addEventListener('input',()=>btn.style.display=inp.value?'flex':'none');
    btn.addEventListener('click',()=>{inp.value='';inp.focus();btn.style.display='none';});
    wrap.appendChild(btn);
  });
}

// ══════════════════════════════════════════
//  GITHUB VERSION CHECKER
// ══════════════════════════════════════════
const GH_REPO='empowercouple24/MyOrgTracker';
let _ghBaseSha=null,_ghLimited=false;

async function _ghFetch(){
  if(_ghLimited)return;
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_REPO}/commits/main`,{
      headers:{'Accept':'application/vnd.github.v3+json'},cache:'no-store'
    });
    if(r.status===403||r.status===429){_ghLimited=true;_ghSet('rate');return;}
    if(!r.ok){_ghSet('error');return;}
    const d=await r.json();
    const sha=(d.sha||'').slice(0,7);
    const msg=(d.commit?.message||'').split('\n')[0];
    if(!_ghBaseSha){_ghBaseSha=sha;_ghSet('ok',sha);return;}
    _ghSet(sha!==_ghBaseSha?'update':'ok',sha,msg);
  }catch{_ghSet('error');}
}
function _ghSet(state,sha,msg){
  document.querySelectorAll('.gh-check').forEach(el=>{
    el.className='gh-check '+state;
    if(state==='ok'){el.innerHTML='✓ '+sha;el.title='Up to date ('+sha+')';el.onclick=null;}
    else if(state==='update'){el.innerHTML='↑ Reload';el.title=(msg||'New commit')+' — click to reload';el.onclick=()=>location.reload(true);}
    else if(state==='checking'){el.innerHTML='···';el.onclick=null;}
    else{el.onclick=null;}
  });
}
function startGhChecker(){
  _ghSet('checking');
  _ghFetch();
  setInterval(()=>{if(!document.hidden)_ghFetch();},10000);
}

</script>
</body>
</html>
