<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4ede1">
<title>MyOrgTracker · Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2318181b'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='EB Garamond,serif' font-weight='600' font-size='20' fill='%23fbbf24' letter-spacing='-0.03em'%3EO%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{background:#f4ede1;-webkit-tap-highlight-color:transparent}
body{font-family:'Geist',system-ui,sans-serif;background:#f4ede1;color:#18181b;min-height:100vh;min-height:100dvh;line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;padding:0 20px}

.page{flex:1;display:flex;flex-direction:column;max-width:440px;margin:0 auto;width:100%;padding-top:48px;padding-bottom:28px}

.wm{font-family:'EB Garamond',serif;line-height:0.95;letter-spacing:-0.015em;color:#18181b;display:inline-flex;align-items:baseline}
.wm .my{font-style:italic;font-weight:400}
.wm .org{font-weight:600}
.wm .tracker{font-weight:400;color:#7a7568;margin-left:0.04em}

.topbar{display:flex;align-items:center;justify-content:center;margin-bottom:56px}

.hero-intro{margin-bottom:28px}
.hero-intro h2{font-family:'EB Garamond',serif;font-size:clamp(28px,8vw,34px);font-weight:400;letter-spacing:-0.01em;line-height:1.1;color:#18181b;margin-bottom:10px}
.hero-intro h2 em{font-style:italic}
.hero-intro p{font-size:15px;color:#5d5a52;line-height:1.55;max-width:360px}

.card{background:#fbf6ec;border-radius:20px;padding:26px 24px;box-shadow:0 1px 2px rgba(61,46,31,0.04),0 10px 28px rgba(61,46,31,0.06);border:1px solid rgba(61,46,31,0.06)}
.card-head{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#8a8578;margin-bottom:18px;font-weight:500}

.field{margin-bottom:14px}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#7a7568;margin-bottom:6px;font-weight:500}
.field input{width:100%;height:48px;border:1px solid rgba(61,46,31,0.14);border-radius:10px;padding:0 14px;font-size:16px;background:#fffdf5;color:#18181b;outline:none;font-family:'Geist',sans-serif;transition:.15s;-webkit-appearance:none}
.field input:focus{border-color:#18181b;background:#fff}
.field input:disabled{opacity:0.5;background:#f5f0e3}
.hint{font-size:12px;color:#8a8578;margin-top:6px;line-height:1.5}

.btn-primary{width:100%;height:52px;background:#18181b;color:#fafaf8;border:none;border-radius:11px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;letter-spacing:0.005em;transition:.15s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px}
.btn-primary:hover:not(:disabled){transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fafaf8;border-radius:50%;animation:spin .75s linear infinite;display:none}
.btn-primary.loading .spinner{display:block}
.btn-primary.loading .btn-label{opacity:0.75}
@keyframes spin{to{transform:rotate(360deg)}}

.alert{font-size:13.5px;line-height:1.5;border-radius:10px;padding:12px 14px;margin-bottom:16px;display:none}
.alert.on{display:block}
.alert-err{background:#fbf0f0;color:#3d1a24;border:1px solid rgba(184,74,94,0.22)}
.alert-ok{background:#f0f6ed;color:#1d3312;border:1px solid rgba(90,138,58,0.25)}

.loading-state{text-align:center;padding:44px 20px;color:#7a7568;font-size:14px}
.loading-state .dots::after{content:'';animation:dots 1.4s infinite;display:inline-block;width:1ch;text-align:left}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

.back-link{display:block;text-align:center;margin-top:24px;font-size:13.5px;color:#7a7568;text-decoration:none;font-weight:500}
.back-link:hover{color:#18181b}
.back-link span{border-bottom:1px solid rgba(24,24,27,0.25);padding-bottom:1px}

.lp-footer{margin-top:auto;padding-top:40px;text-align:center;font-size:11px;color:#a89f8d;font-family:'DM Mono',monospace;letter-spacing:0.14em;text-transform:uppercase}

html::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background-image:radial-gradient(rgba(61,46,31,0.025) 1px,transparent 1px);background-size:3px 3px}

.hidden{display:none !important}
</style>
</head>
<body>

<div class="page">

  <header class="topbar">
    <div class="wm" style="font-size:clamp(22px,6vw,26px)">
      <span class="my">my</span><span class="org">Org</span><span class="tracker">Tracker</span>
    </div>
  </header>

  <main class="hero-intro" id="hero">
    <h2 id="hero-h"><em>Set a new password.</em></h2>
    <p id="hero-p">Choose a strong password — 8+ characters.</p>
  </main>

  <div id="checking" class="card">
    <div class="loading-state">Verifying reset link<span class="dots"></span></div>
  </div>

  <div id="reset-card" class="card hidden">
    <div class="card-head">New Password</div>
    <div class="alert alert-err" id="alert-err"></div>
    <div class="alert alert-ok" id="alert-ok"></div>

    <form id="reset-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="pw">New Password</label>
        <input type="password" id="pw" name="password" autocomplete="new-password" minlength="8" placeholder="at least 8 characters" required>
      </div>
      <div class="field">
        <label for="pw2">Confirm New Password</label>
        <input type="password" id="pw2" name="password2" autocomplete="new-password" minlength="8" placeholder="type it again" required>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">
        <span class="btn-label">Update Password</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
    </form>
  </div>

  <div id="invalid-card" class="card hidden">
    <div class="card-head">Link expired</div>
    <p style="font-size:14.5px;color:#5d5a52;line-height:1.6;margin-bottom:16px">This password reset link is either expired or has already been used. Request a new one from the sign-in page.</p>
    <a href="/" class="btn-primary" style="text-decoration:none"><span class="btn-label">Back to Sign In</span></a>
  </div>

  <a href="/" class="back-link"><span>Back to sign in</span></a>

  <footer class="lp-footer">
    myOrgTracker
  </footer>

</div>


<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

const SB_URL = 'https://nclvgzirfzddrbsnzryo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbHZnemlyZnpkZHJic256cnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mzc0NTgsImV4cCI6MjA5MjAxMzQ1OH0.y7paxIa6Zd2ubwO8w_YwEHVNiKA5D6L5vHKxz7P6gC0';
const sb = createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });

const $ = id => document.getElementById(id);
const checking = $('checking'), resetCard = $('reset-card'), invalidCard = $('invalid-card');
const form = $('reset-form'), pwEl = $('pw'), pw2El = $('pw2');
const submitBtn = $('submit-btn'), errEl = $('alert-err'), okEl = $('alert-ok');
const heroH = $('hero-h'), heroP = $('hero-p');

function showErr(m){errEl.textContent=m;errEl.classList.add('on');okEl.classList.remove('on')}
function showOk(m){okEl.textContent=m;okEl.classList.add('on');errEl.classList.remove('on')}
function setLoading(on){submitBtn.classList.toggle('loading',on);submitBtn.disabled=on;pwEl.disabled=on;pw2El.disabled=on}

// Supabase's detectSessionInUrl automatically handles the #access_token=... that reset links include
// When the user arrives at /reset-password#access_token=..., a recovery session is created and PASSWORD_RECOVERY event fires.

let recoveryReady = false;

sb.auth.onAuthStateChange((event, session)=>{
  if(event==='PASSWORD_RECOVERY'){
    recoveryReady = true;
    checking.classList.add('hidden');
    resetCard.classList.remove('hidden');
    pwEl.focus();
  }
});

// Fallback: after 3 seconds, if we still haven't seen PASSWORD_RECOVERY and there's no session, assume link is invalid
setTimeout(async()=>{
  if(recoveryReady) return;
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    // Treat any active session as valid (Supabase sometimes fires the event before we subscribe)
    recoveryReady = true;
    checking.classList.add('hidden');
    resetCard.classList.remove('hidden');
    pwEl.focus();
  } else {
    checking.classList.add('hidden');
    invalidCard.classList.remove('hidden');
    heroH.innerHTML='<em>Something went wrong.</em>';
    heroP.textContent='We couldn\'t verify that reset link.';
  }
},3000);

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pw = pwEl.value;
  const pw2 = pw2El.value;
  if(pw.length < 8){ showErr('Password must be at least 8 characters.'); return }
  if(pw !== pw2){ showErr('Passwords don\'t match.'); return }
  setLoading(true);
  const { error } = await sb.auth.updateUser({ password: pw });
  setLoading(false);
  if(error){ showErr(error.message); return }
  showOk('Password updated! Redirecting…');
  setTimeout(()=>{
    window.location.href = '/';
  }, 1600);
});
</script>

</body>
</html>
